<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>子种大川 · 阅览</title>
    <meta name="description" content="子种大川制品线上阅览页。" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="assets/club-logo.png" />
    <link rel="apple-touch-icon" href="assets/club-logo.png" />
    <style>
      @font-face {
        font-family: "ZDC Numerals";
        src:
          local("Bodoni 72"),
          local("Didot"),
          local("Palatino");
        unicode-range:
          U+0030-0039,
          U+FF10-FF19,
          U+0025,
          U+002D,
          U+002E,
          U+002F,
          U+003A,
          U+003B,
          U+00A5;
      }

      @font-face {
        font-family: "ZDC Web Song";
        src: url("assets/fonts/noto-serif-sc-400.woff2") format("woff2");
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      @font-face {
        font-family: "ZDC Web Song";
        src: url("assets/fonts/noto-serif-sc-600.woff2") format("woff2");
        font-display: swap;
        font-style: normal;
        font-weight: 600;
      }

      @font-face {
        font-family: "ZDC Web Song";
        src: url("assets/fonts/noto-serif-sc-700.woff2") format("woff2");
        font-display: swap;
        font-style: normal;
        font-weight: 700;
      }

      :root {
        color-scheme: light;
        --paper: #fff9f2;
        --paper-deep: #f7ecdf;
        --ink: #241616;
        --muted: #6c5e5a;
        --line: rgba(116, 24, 31, 0.18);
        --burgundy: #74181f;
        --brand: var(--burgundy);
        --brand-soft: rgba(116, 24, 31, 0.1);
        --header-left: clamp(72px, 10.4vw, 240px);
        --header-right: clamp(72px, 7.7vw, 184px);
        --header-width: 1320px;
        --number-font: "ZDC Numerals", "Bodoni 72", Didot, Palatino;
        --ui-font: var(--number-font), "ZDC Web Song", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
        --song-font: var(--number-font), "ZDC Web Song", "Songti SC", "STSong",
          "Noto Serif CJK SC", "SimSun", Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: var(--ui-font);
        font-feature-settings:
          "onum" 0,
          "lnum" 1,
          "pnum" 1;
        font-variant-numeric: lining-nums proportional-nums;
        background:
          linear-gradient(180deg, rgba(116, 24, 31, 0.12), rgba(255, 249, 242, 0) 260px),
          radial-gradient(circle at 12% 0%, rgba(116, 24, 31, 0.1), transparent 360px),
          var(--paper);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .reader-header {
        position: sticky;
        top: -1px;
        z-index: 20;
        padding-top: 1px;
        background: linear-gradient(
          180deg,
          rgba(235, 218, 209, 0.98) 0%,
          rgba(247, 236, 224, 0.92) 42%,
          rgba(255, 249, 242, 0.76) 72%,
          rgba(255, 249, 242, 0) 100%
        );
      }

      .reader-header::before {
        position: absolute;
        top: -2px;
        right: 0;
        left: 0;
        height: 3px;
        content: "";
        background: rgba(247, 236, 224, 0.98);
        pointer-events: none;
      }

      .reader-header-inner {
        width: calc(100% - var(--header-left) - var(--header-right));
        min-height: 116px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 42px;
        margin-right: auto;
        margin-left: var(--header-left);
      }

      .reader-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #2d090d;
        font-family: var(--song-font);
        font-weight: 700;
        white-space: nowrap;
      }

      .reader-brand img {
        width: 3.56rem;
        height: 3.56rem;
        object-fit: contain;
      }

      .reader-brand-title {
        position: relative;
        width: 2.05em;
        height: 2.42em;
        display: inline-block;
        flex: 0 0 auto;
        color: var(--burgundy);
        font-family: var(--song-font);
        font-size: 1.34rem;
        font-weight: 600;
        letter-spacing: 0;
        line-height: 1;
        transform: scaleX(0.82);
        transform-origin: left center;
      }

      .reader-brand-char {
        position: absolute;
        display: block;
      }

      .reader-brand-char-1 {
        top: 0;
        left: 0;
      }

      .reader-brand-char-2 {
        top: 1.08em;
        left: 0;
      }

      .reader-brand-char-3 {
        top: 0.54em;
        right: 0;
      }

      .reader-brand-char-4 {
        top: 1.62em;
        right: 0;
      }

      .reader-title {
        flex: 1;
        min-width: 0;
        color: #4f151b;
        font-family: var(--song-font);
        text-align: right;
      }

      .reader-title h1 {
        margin: 0;
        overflow: hidden;
        color: #6c1018;
        font-size: clamp(1.08rem, 1.08vw, 1.18rem);
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .reader-main {
        min-height: calc(100vh - 76px);
        padding: 14px clamp(14px, 4vw, 48px) 34px;
      }

      .reader-toolbar {
        position: sticky;
        top: 76px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 12px 0 16px;
        background: linear-gradient(180deg, rgba(251, 247, 242, 0.94), rgba(251, 247, 242, 0.72), rgba(251, 247, 242, 0));
      }

      .reader-button {
        display: inline-grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--brand);
        background: rgba(251, 247, 242, 0.72);
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .reader-button:hover:not(:disabled) {
        border-color: rgba(116, 24, 31, 0.38);
        background: var(--brand-soft);
        transform: translateY(-1px);
      }

      .reader-button:disabled {
        color: rgba(63, 39, 38, 0.26);
        cursor: default;
      }

      .reader-page-state {
        min-width: 92px;
        color: var(--muted);
        font-family: Georgia, "Times", serif;
        font-size: 15px;
        letter-spacing: 0.08em;
        text-align: center;
      }

      .reader-viewport {
        display: grid;
        min-height: calc(100vh - 172px);
        place-items: start center;
      }

      .reader-canvas {
        display: block;
        max-width: 100%;
        height: auto;
        background: #fff;
        box-shadow: 0 18px 50px rgba(63, 39, 38, 0.12);
      }

      .reader-frame {
        width: min(1180px, 100%);
        height: calc(100vh - 158px);
        min-height: 620px;
        border: 1px solid var(--line);
        background: #fff;
        box-shadow: 0 18px 50px rgba(63, 39, 38, 0.1);
      }

      .reader-status {
        width: min(760px, 100%);
        margin: 12vh auto 0;
        color: var(--muted);
        font-size: 15px;
        letter-spacing: 0.08em;
        line-height: 2;
        text-align: center;
      }

      .reader-status a {
        color: var(--brand);
        text-decoration: underline;
        text-underline-offset: 5px;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 760px) {
        .reader-header-inner {
          width: min(var(--header-width), calc(100% - 48px));
          min-height: auto;
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
          margin: 0 auto;
          padding: 14px 0 12px;
        }

        .reader-brand img {
          width: 2.62rem;
          height: 2.62rem;
        }

        .reader-brand-title {
          font-size: 1.06rem;
        }

        .reader-title {
          width: 100%;
          text-align: left;
        }

        .reader-title h1 {
          white-space: normal;
        }

        .reader-main {
          min-height: calc(100vh - 94px);
          padding: 8px 10px 24px;
        }

        .reader-toolbar {
          top: 94px;
          gap: 10px;
        }

        .reader-frame {
          height: calc(100vh - 174px);
          min-height: 500px;
        }
      }
    </style>
  </head>
  <body>
    <header class="reader-header">
      <div class="reader-header-inner">
        <a class="reader-brand" href="index.html#products" aria-label="返回子种大川社团制品">
          <img src="assets/club-logo.png" alt="" />
          <span class="reader-brand-title" aria-hidden="true">
            <span class="reader-brand-char reader-brand-char-1">子</span>
            <span class="reader-brand-char reader-brand-char-2">种</span>
            <span class="reader-brand-char reader-brand-char-3">大</span>
            <span class="reader-brand-char reader-brand-char-4">川</span>
          </span>
        </a>
        <div class="reader-title">
          <h1 data-reader-title>文件阅览</h1>
        </div>
      </div>
    </header>

    <main class="reader-main">
      <div class="reader-toolbar" data-reader-toolbar hidden>
        <button class="reader-button" type="button" data-prev-page aria-label="上一页">‹</button>
        <span class="reader-page-state" data-page-state>1 / 1</span>
        <button class="reader-button" type="button" data-next-page aria-label="下一页">›</button>
        <button class="reader-button" type="button" data-zoom-out aria-label="缩小">−</button>
        <button class="reader-button" type="button" data-zoom-in aria-label="放大">＋</button>
      </div>
      <section class="reader-viewport" data-reader-viewport>
        <p class="reader-status" data-reader-status>正在载入阅览内容。</p>
        <canvas class="reader-canvas" data-reader-canvas hidden></canvas>
        <iframe class="reader-frame" data-reader-frame title="线上阅览" hidden></iframe>
      </section>
    </main>

    <script>
      const PDFJS_VERSION = "4.10.38";
      const PDFJS_SOURCES = [
        {
          module: `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/build/pdf.mjs`,
          worker: `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/build/pdf.worker.mjs`,
          cMapUrl: `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/cmaps/`,
          standardFontDataUrl: `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/standard_fonts/`,
        },
        {
          module: `https://unpkg.com/pdfjs-dist@${PDFJS_VERSION}/build/pdf.mjs`,
          worker: `https://unpkg.com/pdfjs-dist@${PDFJS_VERSION}/build/pdf.worker.mjs`,
          cMapUrl: `https://unpkg.com/pdfjs-dist@${PDFJS_VERSION}/cmaps/`,
          standardFontDataUrl: `https://unpkg.com/pdfjs-dist@${PDFJS_VERSION}/standard_fonts/`,
        },
      ];

      const params = new URLSearchParams(window.location.search);
      const rawFile = params.get("file") || "";
      const readerTitle = params.get("title") || "文件阅览";
      const titleElement = document.querySelector("[data-reader-title]");
      const toolbar = document.querySelector("[data-reader-toolbar]");
      const statusElement = document.querySelector("[data-reader-status]");
      const canvas = document.querySelector("[data-reader-canvas]");
      const frame = document.querySelector("[data-reader-frame]");
      const pageState = document.querySelector("[data-page-state]");
      const prevButton = document.querySelector("[data-prev-page]");
      const nextButton = document.querySelector("[data-next-page]");
      const zoomOutButton = document.querySelector("[data-zoom-out]");
      const zoomInButton = document.querySelector("[data-zoom-in]");

      let pdfDocument = null;
      let currentPage = 1;
      let zoom = 1;
      let renderId = 0;

      titleElement.textContent = readerTitle;
      document.title = `${readerTitle} · 子种大川`;

      function showStatus(message, isError = false) {
        statusElement.hidden = false;
        statusElement.textContent = message;
        statusElement.style.color = isError ? "rgba(116, 24, 31, 0.9)" : "";
      }

      function hideStatus() {
        statusElement.hidden = true;
      }

      function setControls() {
        if (!pdfDocument) {
          return;
        }

        pageState.textContent = `${currentPage} / ${pdfDocument.numPages}`;
        prevButton.disabled = currentPage <= 1;
        nextButton.disabled = currentPage >= pdfDocument.numPages;
        zoomOutButton.disabled = zoom <= 0.75;
        zoomInButton.disabled = zoom >= 1.7;
      }

      function normalizeSource(raw) {
        const trimmed = String(raw || "").trim();

        if (!trimmed) {
          return null;
        }

        try {
          return new URL(trimmed, window.location.href);
        } catch (error) {
          return null;
        }
      }

      function canUseSource(url) {
        if (!url) {
          return false;
        }

        if (url.protocol === "http:" || url.protocol === "https:") {
          return true;
        }

        return window.location.protocol === "file:" && url.protocol === "file:";
      }

      async function loadPdfJs() {
        let lastError = null;

        for (const source of PDFJS_SOURCES) {
          try {
            const pdfjsLib = await import(source.module);
            pdfjsLib.GlobalWorkerOptions.workerSrc = source.worker;

            return { pdfjsLib, source };
          } catch (error) {
            lastError = error;
          }
        }

        throw lastError || new Error("阅读器组件载入失败");
      }

      async function renderPage(pageNumber) {
        if (!pdfDocument) {
          return;
        }

        const thisRender = ++renderId;
        showStatus("正在渲染页面。");

        const page = await pdfDocument.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });
        const availableWidth = Math.max(280, window.innerWidth - (window.innerWidth < 760 ? 28 : 116));
        const fitScale = Math.min(2.2, Math.max(0.45, availableWidth / baseViewport.width));
        const viewport = page.getViewport({ scale: fitScale * zoom });
        const outputScale = Math.min(window.devicePixelRatio || 1, 2);
        const context = canvas.getContext("2d");

        if (thisRender !== renderId) {
          return;
        }

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${viewport.width}px`;
        canvas.style.height = `${viewport.height}px`;

        context.setTransform(1, 0, 0, 1, 0, 0);
        context.clearRect(0, 0, canvas.width, canvas.height);

        const renderTask = page.render({
          canvasContext: context,
          viewport,
          transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null,
        });

        await renderTask.promise;

        if (thisRender !== renderId) {
          return;
        }

        canvas.hidden = false;
        frame.hidden = true;
        toolbar.hidden = false;
        hideStatus();
        setControls();
      }

      async function openWithPdfReader(url) {
        showStatus("正在打开线上阅览器。");

        const { pdfjsLib, source } = await loadPdfJs();

        pdfDocument = await pdfjsLib.getDocument({
          url: url.href,
          cMapUrl: source.cMapUrl,
          cMapPacked: true,
          standardFontDataUrl: source.standardFontDataUrl,
        }).promise;

        currentPage = 1;
        zoom = 1;
        await renderPage(currentPage);
      }

      async function initReader() {
        const sourceUrl = normalizeSource(rawFile);

        if (!canUseSource(sourceUrl)) {
          showStatus("文件链接不可用，请检查维护页中填写的阅览文件地址。", true);
          return;
        }

        try {
          await openWithPdfReader(sourceUrl);
        } catch (error) {
          canvas.hidden = true;
          frame.hidden = true;
          toolbar.hidden = true;
          showStatus(
            sourceUrl.protocol === "file:"
              ? "本地文件预览无法调用线上阅读器。请上传后用网站地址测试，或用本地网页服务打开本文件夹。"
              : "阅读器无法读取这个文件。请确认文件链接为公开地址，并且不要使用需要登录或临时跳转的链接。",
            true,
          );
        }
      }

      prevButton.addEventListener("click", async () => {
        if (!pdfDocument || currentPage <= 1) {
          return;
        }

        currentPage -= 1;
        setControls();
        await renderPage(currentPage);
      });

      nextButton.addEventListener("click", async () => {
        if (!pdfDocument || currentPage >= pdfDocument.numPages) {
          return;
        }

        currentPage += 1;
        setControls();
        await renderPage(currentPage);
      });

      zoomOutButton.addEventListener("click", async () => {
        zoom = Math.max(0.75, Math.round((zoom - 0.1) * 10) / 10);
        setControls();
        await renderPage(currentPage);
      });

      zoomInButton.addEventListener("click", async () => {
        zoom = Math.min(1.7, Math.round((zoom + 0.1) * 10) / 10);
        setControls();
        await renderPage(currentPage);
      });

      window.addEventListener("resize", () => {
        if (!pdfDocument || canvas.hidden) {
          return;
        }

        window.clearTimeout(window.readerResizeTimer);
        window.readerResizeTimer = window.setTimeout(() => {
          renderPage(currentPage);
        }, 160);
      });

      initReader();
    </script>
  </body>
</html>
