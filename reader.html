<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>子种大川 · 阅览</title>
    <meta name="description" content="子种大川制品线上阅览页。" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="assets/club-logo.png" />
    <link rel="apple-touch-icon" href="assets/club-logo.png" />
    <style>
      :root {
        color-scheme: light;
        --paper: #fbf7f2;
        --paper-deep: #f1e6dc;
        --ink: #3f2726;
        --muted: rgba(63, 39, 38, 0.66);
        --line: rgba(116, 24, 31, 0.18);
        --brand: #74181f;
        --brand-soft: rgba(116, 24, 31, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Songti SC", "Noto Serif CJK SC", STSong, SimSun, serif;
        background:
          linear-gradient(180deg, rgba(116, 24, 31, 0.12), rgba(251, 247, 242, 0) 260px),
          radial-gradient(circle at 12% 0%, rgba(116, 24, 31, 0.1), transparent 360px),
          var(--paper);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      .reader-header {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        min-height: 76px;
        padding: 14px clamp(20px, 5vw, 72px);
        background: linear-gradient(180deg, rgba(251, 247, 242, 0.96), rgba(251, 247, 242, 0.84));
        backdrop-filter: blur(18px);
      }

      .reader-brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-width: max-content;
        color: var(--brand);
        font-size: 18px;
        letter-spacing: 0.08em;
      }

      .reader-brand img {
        width: 36px;
        height: 36px;
        object-fit: contain;
      }

      .reader-title {
        flex: 1;
        min-width: 0;
        text-align: center;
      }

      .reader-title small {
        display: block;
        margin-bottom: 3px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.28em;
      }

      .reader-title h1 {
        margin: 0;
        overflow: hidden;
        color: rgba(116, 24, 31, 0.92);
        font-size: clamp(18px, 2vw, 26px);
        font-weight: 650;
        letter-spacing: 0.08em;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .reader-main {
        min-height: calc(100vh - 76px);
        padding: 14px clamp(14px, 4vw, 48px) 34px;
      }

      .reader-toolbar {
        position: sticky;
        top: 76px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 12px 0 16px;
        background: linear-gradient(180deg, rgba(251, 247, 242, 0.94), rgba(251, 247, 242, 0.72), rgba(251, 247, 242, 0));
      }

      .reader-button {
        display: inline-grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--brand);
        background: rgba(251, 247, 242, 0.72);
        cursor: pointer;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .reader-button:hover:not(:disabled) {
        border-color: rgba(116, 24, 31, 0.38);
        background: var(--brand-soft);
        transform: translateY(-1px);
      }

      .reader-button:disabled {
        color: rgba(63, 39, 38, 0.26);
        cursor: default;
      }

      .reader-page-state {
        min-width: 92px;
        color: var(--muted);
        font-family: Georgia, "Times", serif;
        font-size: 15px;
        letter-spacing: 0.08em;
        text-align: center;
      }

      .reader-viewport {
        display: grid;
        min-height: calc(100vh - 172px);
        place-items: start center;
      }

      .reader-canvas {
        display: block;
        max-width: 100%;
        height: auto;
        background: #fff;
        box-shadow: 0 18px 50px rgba(63, 39, 38, 0.12);
      }

      .reader-frame {
        width: min(1180px, 100%);
        height: calc(100vh - 158px);
        min-height: 620px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .reader-status {
        width: min(760px, 100%);
        margin: 12vh auto 0;
        color: var(--muted);
        font-size: 15px;
        letter-spacing: 0.08em;
        line-height: 2;
        text-align: center;
      }

      .reader-status a {
        color: var(--brand);
        text-decoration: underline;
        text-underline-offset: 5px;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 760px) {
        .reader-header {
          align-items: flex-start;
          gap: 10px;
          min-height: 94px;
          padding: 12px 16px;
        }

        .reader-brand {
          font-size: 15px;
        }

        .reader-brand img {
          width: 30px;
          height: 30px;
        }

        .reader-title {
          text-align: left;
        }

        .reader-title h1 {
          white-space: normal;
        }

        .reader-toolbar {
          top: 94px;
          gap: 10px;
        }

        .reader-main {
          min-height: calc(100vh - 94px);
          padding: 8px 10px 24px;
        }

        .reader-frame {
          height: calc(100vh - 174px);
          min-height: 500px;
        }
      }
    </style>
  </head>
  <body>
    <header class="reader-header">
      <a class="reader-brand" href="index.html#products" aria-label="返回子种大川社团制品">
        <img src="assets/club-logo.png" alt="" />
        <span>子种大川</span>
      </a>
      <div class="reader-title">
        <small>线上阅览</small>
        <h1 data-reader-title>文件阅览</h1>
      </div>
    </header>

    <main class="reader-main">
      <div class="reader-toolbar" data-reader-toolbar hidden>
        <button class="reader-button" type="button" data-prev-page aria-label="上一页">‹</button>
        <span class="reader-page-state" data-page-state>1 / 1</span>
        <button class="reader-button" type="button" data-next-page aria-label="下一页">›</button>
        <button class="reader-button" type="button" data-zoom-out aria-label="缩小">−</button>
        <button class="reader-button" type="button" data-zoom-in aria-label="放大">＋</button>
      </div>
      <section class="reader-viewport" data-reader-viewport>
        <p class="reader-status" data-reader-status>正在载入阅览内容。</p>
        <canvas class="reader-canvas" data-reader-canvas hidden></canvas>
        <iframe class="reader-frame" data-reader-frame title="线上阅览" hidden></iframe>
      </section>
    </main>

    <script type="module">
      const PDFJS_VERSION = "4.10.38";
      const PDFJS_MODULE = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/build/pdf.mjs`;
      const PDFJS_WORKER = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/build/pdf.worker.mjs`;
      const PDFJS_CMAPS = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/cmaps/`;
      const PDFJS_STANDARD_FONTS = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/standard_fonts/`;

      const params = new URLSearchParams(window.location.search);
      const rawFile = params.get("file") || "";
      const readerTitle = params.get("title") || "文件阅览";
      const titleElement = document.querySelector("[data-reader-title]");
      const toolbar = document.querySelector("[data-reader-toolbar]");
      const statusElement = document.querySelector("[data-reader-status]");
      const canvas = document.querySelector("[data-reader-canvas]");
      const frame = document.querySelector("[data-reader-frame]");
      const pageState = document.querySelector("[data-page-state]");
      const prevButton = document.querySelector("[data-prev-page]");
      const nextButton = document.querySelector("[data-next-page]");
      const zoomOutButton = document.querySelector("[data-zoom-out]");
      const zoomInButton = document.querySelector("[data-zoom-in]");

      let sourceUrl = null;
      let pdfDocument = null;
      let currentPage = 1;
      let zoom = 1;
      let renderId = 0;

      titleElement.textContent = readerTitle;
      document.title = `${readerTitle} · 子种大川`;

      function showStatus(message, isError = false) {
        statusElement.hidden = false;
        statusElement.textContent = message;
        statusElement.style.color = isError ? "rgba(116, 24, 31, 0.9)" : "";
      }

      function hideStatus() {
        statusElement.hidden = true;
      }

      function setControls() {
        if (!pdfDocument) {
          return;
        }

        pageState.textContent = `${currentPage} / ${pdfDocument.numPages}`;
        prevButton.disabled = currentPage <= 1;
        nextButton.disabled = currentPage >= pdfDocument.numPages;
        zoomOutButton.disabled = zoom <= 0.75;
        zoomInButton.disabled = zoom >= 1.7;
      }

      function normalizeSource(raw) {
        const trimmed = String(raw || "").trim();

        if (!trimmed) {
          return null;
        }

        try {
          return new URL(trimmed, window.location.href);
        } catch (error) {
          return null;
        }
      }

      function canUseSource(url) {
        if (!url) {
          return false;
        }

        if (url.protocol === "http:" || url.protocol === "https:") {
          return true;
        }

        return window.location.protocol === "file:" && url.protocol === "file:";
      }

      function getExternalViewerUrl(url) {
        if (url.protocol === "file:") {
          return url.href;
        }

        return `https://docs.google.com/gview?embedded=1&url=${encodeURIComponent(url.href)}`;
      }

      function showFrame(url) {
        toolbar.hidden = true;
        canvas.hidden = true;
        frame.hidden = false;
        frame.src = url.href;
        hideStatus();
      }

      function showExternalViewer(url) {
        toolbar.hidden = true;
        canvas.hidden = true;
        frame.hidden = false;
        frame.src = getExternalViewerUrl(url);
        hideStatus();
      }

      async function renderPage(pageNumber) {
        if (!pdfDocument) {
          return;
        }

        const thisRender = ++renderId;
        showStatus("正在渲染页面。");

        const page = await pdfDocument.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });
        const availableWidth = Math.max(280, window.innerWidth - (window.innerWidth < 760 ? 28 : 116));
        const fitScale = Math.min(2.2, Math.max(0.45, availableWidth / baseViewport.width));
        const viewport = page.getViewport({ scale: fitScale * zoom });
        const outputScale = Math.min(window.devicePixelRatio || 1, 2);
        const context = canvas.getContext("2d");

        if (thisRender !== renderId) {
          return;
        }

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${viewport.width}px`;
        canvas.style.height = `${viewport.height}px`;

        context.setTransform(1, 0, 0, 1, 0, 0);
        context.clearRect(0, 0, canvas.width, canvas.height);

        const renderTask = page.render({
          canvasContext: context,
          viewport,
          transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null,
        });

        await renderTask.promise;

        if (thisRender !== renderId) {
          return;
        }

        canvas.hidden = false;
        frame.hidden = true;
        toolbar.hidden = false;
        hideStatus();
        setControls();
      }

      async function openWithPdfReader(url) {
        showStatus("正在打开线上阅览器。");

        const pdfjsLib = await import(PDFJS_MODULE);
        pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;

        pdfDocument = await pdfjsLib.getDocument({
          url: url.href,
          cMapUrl: PDFJS_CMAPS,
          cMapPacked: true,
          standardFontDataUrl: PDFJS_STANDARD_FONTS,
        }).promise;

        currentPage = 1;
        zoom = 1;
        await renderPage(currentPage);
      }

      async function initReader() {
        sourceUrl = normalizeSource(rawFile);

        if (!canUseSource(sourceUrl)) {
          showStatus("文件链接不可用，请检查维护页中填写的阅览文件地址。", true);
          return;
        }

        if (sourceUrl.protocol === "file:") {
          showFrame(sourceUrl);
          return;
        }

        try {
          await openWithPdfReader(sourceUrl);
        } catch (error) {
          showExternalViewer(sourceUrl);
        }
      }

      prevButton.addEventListener("click", async () => {
        if (!pdfDocument || currentPage <= 1) {
          return;
        }

        currentPage -= 1;
        setControls();
        await renderPage(currentPage);
      });

      nextButton.addEventListener("click", async () => {
        if (!pdfDocument || currentPage >= pdfDocument.numPages) {
          return;
        }

        currentPage += 1;
        setControls();
        await renderPage(currentPage);
      });

      zoomOutButton.addEventListener("click", async () => {
        zoom = Math.max(0.75, Math.round((zoom - 0.1) * 10) / 10);
        setControls();
        await renderPage(currentPage);
      });

      zoomInButton.addEventListener("click", async () => {
        zoom = Math.min(1.7, Math.round((zoom + 0.1) * 10) / 10);
        setControls();
        await renderPage(currentPage);
      });

      window.addEventListener("resize", () => {
        if (!pdfDocument || canvas.hidden) {
          return;
        }

        window.clearTimeout(window.readerResizeTimer);
        window.readerResizeTimer = window.setTimeout(() => {
          renderPage(currentPage);
        }, 160);
      });

      initReader();
    </script>
  </body>
</html>
